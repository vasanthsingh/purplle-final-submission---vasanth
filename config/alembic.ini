[alembic]
script_location = config/alembic
prepend_sys_path = .
; Placeholder only — the real URL is injected from the DATABASE_URL
; environment variable by config/alembic/env.py (os.getenv). Do not put
; real credentials here.
sqlalchemy.url = sqlite+aiosqlite:///./data/apex.db

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
